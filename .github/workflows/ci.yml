name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore eQuantic.Linq.sln
      - name: Build
        run: dotnet build eQuantic.Linq.sln -c Release --no-restore
      - name: Test (net8.0 + net10.0)
        run: dotnet test eQuantic.Linq.sln -c Release --no-build --logger "console;verbosity=minimal"

  pack:
    name: Pack
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Pack all packages
        run: |
          for project in src/*/*.csproj; do
            dotnet pack "$project" -c Release
          done
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: src/artifacts/*nupkg

  # Publishing is EXPLICITLY gated: only version tags (v*) reach NuGet.org — never branch pushes.
  publish:
    name: Publish to NuGet.org
    needs: pack
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: packages
          path: packages
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - name: Push packages
        run: dotnet nuget push "packages/*.nupkg" --skip-duplicate -k ${{ secrets.NUGET_API_KEY }} -s https://api.nuget.org/v3/index.json
